name: CI

on:
  push:
    branches: [ main, git_ci_setup ]
  pull_request:
    branches: [ main, git_ci_setup ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
